# ============================================================
# OSINT Knowledge Graph - local infrastructure
# Services: PostgreSQL, Neo4j (+APOC), Redis, RabbitMQ, API, worker
# Usage: cp .env.example .env && docker compose up -d
# ============================================================

name: osint-knowledge-graph

x-common-env: &common-env
  ENVIRONMENT: ${ENVIRONMENT:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  POSTGRES_USER: ${POSTGRES_USER:-osint}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
  POSTGRES_DB: ${POSTGRES_DB:-osint}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: 5432
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: ${NEO4J_USER:-neo4j}
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change_me_neo4j}
  REDIS_HOST: redis
  REDIS_PORT: 6379
  REDIS_DB: ${REDIS_DB:-0}
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  CELERY_BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-osint}:${RABBITMQ_DEFAULT_PASS:-change_me_rabbit}@rabbitmq:5672//
  CELERY_RESULT_BACKEND: redis://redis:6379/0

services:
  # ---------- PostgreSQL: raw articles, logs, provenance ----------
  postgres:
    image: postgres:16-alpine
    container_name: osint-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-osint}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_postgres}
      POSTGRES_DB: ${POSTGRES_DB:-osint}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-osint} -d ${POSTGRES_DB:-osint}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - osint-net

  # ---------- Neo4j: knowledge graph (with APOC) ----------
  neo4j:
    image: neo4j:5-community
    container_name: osint-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/change_me_neo4j}
      # Enable APOC for advanced graph algorithms/utilities.
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./infra/neo4j/init:/init:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - osint-net

  # ---------- Redis: cache + Celery result backend ----------
  redis:
    image: redis:7-alpine
    container_name: osint-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - osint-net

  # ---------- RabbitMQ: Celery broker ----------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: osint-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-osint}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change_me_rabbit}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - osint-net

  # ---------- FastAPI application ----------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: osint-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
    ports:
      - "${API_PORT:-8000}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - osint-net

  # ---------- Celery worker: ingestion + dispatch (default queue) ----------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: osint-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
    command: celery -A app.workers.celery_app worker -Q celery --loglevel=INFO
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - osint-net

  # ---------- Celery NLP worker: CPU-heavy NER (nlp_tasks queue) ----------
  nlp-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: osint-nlp-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
    command: celery -A app.workers.celery_app worker -Q nlp_tasks --concurrency=2 --loglevel=INFO
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - osint-net

  # ---------- Celery Beat: periodic (cron) ingestion scheduler ----------
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: osint-beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *common-env
    command: celery -A app.workers.celery_app beat --loglevel=INFO
    volumes:
      - ./backend:/app
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - osint-net

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
  rabbitmq_data:

networks:
  osint-net:
    driver: bridge
